{% extends "base.html" %}
{% block title %}登录 - {{ site_name }}{% endblock %}
{% block content %}
<div class="login-box">
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <div class="card">
        <h2>🔐 知识库登录</h2>
        <form method="post">
            <div class="form-group">
                <label>管理密码</label>
                <input type="password" name="password" placeholder="请输入密码" autofocus required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width:100%;">登 录</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
