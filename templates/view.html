{% extends "base.html" %}
{% block title %}{{ page.title }} - {{ site_name }}{% endblock %}
{% block content %}
<div class="actions">
    <a href="{{ url_for('edit_page', title=page.title) }}" class="btn btn-primary">✏️ 编辑</a>
    <a href="{{ url_for('index') }}" class="btn btn-outline">📋 返回列表</a>
    <form method="post" action="{{ url_for('delete_page', title=page.title) }}" style="display:inline;" onsubmit="return confirm('确认删除「{{ page.title }}」？');">
        <button type="submit" class="btn btn-danger">🗑️ 删除</button>
    </form>
</div>

<article class="card">
    <h1 style="font-size:1.6rem; font-weight:600; margin-bottom:6px;">{{ page.title }}</h1>
    <div class="meta" style="margin-bottom:20px;">最后更新: {{ page.updated_at }}</div>
    <div class="wiki-content">{{ html|safe }}</div>
</article>
{% endblock %}
