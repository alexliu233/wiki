{% extends "base.html" %}
{% block title %}{{ site_name }}{% endblock %}
{% block content %}
<div class="actions">
    <a href="{{ url_for('edit_page', title='首页') }}" class="btn btn-primary">✏️ 编辑首页</a>
    <a href="{{ url_for('edit_page', title='新页面') }}" class="btn btn-outline">➕ 新建页面</a>
</div>

<h2 style="font-size:18px; font-weight:600; margin-bottom:16px;">📄 所有页面</h2>

{% if pages %}
    {% for p in pages %}
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <a href="{{ url_for('view_page', title=p.title) }}" style="font-size:15px; font-weight:500;">
                    {{ p.title }}
                </a>
                <div class="meta">更新于 {{ p.updated_at }}</div>
            </div>
            <a href="{{ url_for('edit_page', title=p.title) }}" class="btn btn-outline" style="font-size:12px; padding:4px 12px;">编辑</a>
        </div>
    {% endfor %}
{% else %}
    <div class="card" style="text-align:center; color:var(--ink-muted-48);">
        暂无页面 — <a href="{{ url_for('edit_page', title='首页') }}">创建首页</a>
    </div>
{% endif %}
{% endblock %}
